spring:
  application:
    name: ai-data-chat-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_data_chat}
    username: ${SPRING_DATASOURCE_USERNAME:ai_data_chat}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
  session:
    timeout: ${SESSION_TIMEOUT:30m}
    jdbc:
      initialize-schema: never
      table-name: identity.spring_session

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never
  servlet:
    session:
      cookie:
        name: AI_DATA_CHAT_SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

info:
  application:
    name: AI Data Chat
    version: "@project.version@"
    sprint: 4

app:
  chat:
    stream-timeout: ${CHAT_STREAM_TIMEOUT:2m}
    heartbeat-interval: ${CHAT_HEARTBEAT_INTERVAL:15s}
    max-history-messages: ${CHAT_MAX_HISTORY_MESSAGES:200}
    max-history-characters: ${CHAT_MAX_HISTORY_CHARACTERS:200000}
    max-response-characters: ${CHAT_MAX_RESPONSE_CHARACTERS:1000000}
    max-tool-rounds: ${MAX_TOOL_ROUNDS:6}
    max-tool-result-bytes: ${MAX_TOOL_RESULT_BYTES:1048576}
  identity:
    allow-public-registration: ${ALLOW_PUBLIC_REGISTRATION:true}
  security:
    csrf-cookie-secure: ${CSRF_COOKIE_SECURE:false}
    rate-limit:
      login:
        attempts: ${LOGIN_RATE_LIMIT_ATTEMPTS:5}
        window: ${LOGIN_RATE_LIMIT_WINDOW:1m}
      registration:
        attempts: ${REGISTRATION_RATE_LIMIT_ATTEMPTS:10}
        window: ${REGISTRATION_RATE_LIMIT_WINDOW:1h}
  integrations:
    mode: ${APP_INTEGRATIONS_MODE:fake}
  rag:
    storage:
      path: ${RAG_STORAGE_PATH:/var/lib/ai-data-chat/documents}
  providers:
    credential-master-key: ${CREDENTIAL_MASTER_KEY:}
    credential-key-version: ${CREDENTIAL_KEY_VERSION:1}
    allowed-hosts: ${PROVIDER_ALLOWED_HOSTS:}
    allowed-http-hosts: ${PROVIDER_ALLOWED_HTTP_HOSTS:}
    http:
      timeout: ${PROVIDER_HTTP_TIMEOUT:10s}
      max-response-bytes: ${PROVIDER_MAX_RESPONSE_BYTES:1048576}
    byteplus:
      ap-southeast-1-base-url: https://ark.ap-southeast.bytepluses.com/api/v3
  mcp:
    mode: ${MCP_INTEGRATION_MODE:fake}
    base-url: ${MCP_BASE_URL:http://data-platform-mcp:8000}
    endpoint: ${MCP_ENDPOINT:/mcp}
    protocol-version: ${MCP_PROTOCOL_VERSION:2025-11-25}
    required-contract-major: ${MCP_CONTRACT_MAJOR:1}
    status-refresh-interval: ${MCP_STATUS_REFRESH_INTERVAL:30s}
    tool-call-timeout: ${MCP_TOOL_CALL_TIMEOUT:20s}
    http:
      timeout: ${MCP_HTTP_TIMEOUT:10s}
      max-response-bytes: ${MCP_HTTP_MAX_RESPONSE_BYTES:1048576}
